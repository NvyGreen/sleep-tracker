<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Log Sleep
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Log Sleep</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <!-- Display Logged Data -->
    <ion-list>
      @for (data of allOvernightData; track data; let index = $index) {
        <ion-item>
          <ion-label>
            <h2>{{ data.dateString() }}</h2>
            <p>Slept for {{ data.summaryString() }}</p>
          </ion-label>
        </ion-item>
      }
    </ion-list>

    <!-- Fab Button to pull up Modal -->
    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button id="add-sleeptime">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>

    <!-- Modal Content -->
    <ion-modal
      #sleepModal
      trigger="add-sleeptime"
      [initialBreakpoint]="1"
      [breakpoints]="[0, 1]"
      (willDismiss)="onWillDismiss($event)"
    >
      <ng-template>
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-button class="modal__button" (click)="sleepModal.dismiss(null, 'cancel')">Cancel</ion-button>
            </ion-buttons>

            <ion-title class="modal__title">Log Last Night's Sleep</ion-title>

            <ion-buttons slot="end">
              <ion-button
                class="modal__button"
                (click)="sleepModal.dismiss({ sleptAt: sleepTime.sleptAt, wokeAt: sleepTime.wokeAt }, 'confirm')"
                [strong]="true"
              >
                Confirm
              </ion-button>
            </ion-buttons>
          </ion-toolbar>
        </ion-header>

        <ion-content>
          <ion-list>
            <ion-item>
              <ion-input label="Slept at" [value]="sleepTime.sleptAt | date: 'h:mm a'" id="slept"></ion-input>
            </ion-item>

            <ion-popover trigger="slept" size="cover">
              <ng-template>
                <ion-datetime
                  presentation="time"
                  [preferWheel]="true"
                  class="modal__datetime"
                  [(ngModel)]="sleepTime.sleptAt"
                  (ngModelChange)="onSleptAtChanged($event)"
                  minuteValues="0,5,10,15,25,30,35,40,45,50,55"
                  locale="en-US"></ion-datetime>
              </ng-template>
            </ion-popover>

            <ion-item>
              <ion-input label="Woke at" [value]="sleepTime.wokeAt | date: 'h:mm a'" id="woke"></ion-input>
            </ion-item>

            <ion-popover trigger="woke" size="cover">
              <ng-template>
                <ion-datetime
                  presentation="time"
                  [preferWheel]="true"
                  class="modal__datetime"
                  [(ngModel)]="sleepTime.wokeAt"
                  minuteValues="0,5,10,15,25,30,35,40,45,50,55"
                  locale="en-US"></ion-datetime>
              </ng-template>
            </ion-popover>

          </ion-list>
        </ion-content>
      </ng-template>
    </ion-modal>
  </div>
</ion-content>
